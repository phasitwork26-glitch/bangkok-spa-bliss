<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bangkok Spa Bliss</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white">

  <section class="py-20 text-center">
    <h1 class="text-4xl font-bold text-yellow-400 mb-6">
      Book Your Spa Session
    </h1>

    <div class="max-w-md mx-auto bg-gray-900 p-8 rounded-xl shadow-lg">

      <input id="name" type="text" placeholder="Your Name"
        class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700" />

      <input id="phone" type="text" placeholder="Phone Number"
        class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700" />

      <input id="date" type="date"
        class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700" />

      <input id="time" type="time"
        class="w-full mb-6 p-3 rounded bg-gray-800 border border-gray-700" />

      <button onclick="bookNow()"
        class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg hover:bg-yellow-400 transition">
        Confirm Booking
      </button>

      <p id="message" class="mt-4 text-green-400"></p>

    </div>
  </section>

<script>
  const supabase = window.supabase.createClient(
    "https://eworiufajrgusnyuptme.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3b3JpdWZhanJndXNueXVwdG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjM3MzEsImV4cCI6MjA4ODE5OTczMX0.8aKnFHsrQoUl5yvtMYQXmSTdE14N7Tkd1uhzu9KyPKs"
  );

  async function bookNow() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if (!name || !phone || !date || !time) {
      document.getElementById("message").innerText = "Please fill all fields.";
      return;
    }

    const { error } = await supabase
      .from("bookings")
      .insert([{ name, phone, date, time }]);

    if (error) {
      document.getElementById("message").innerText = "Booking failed!";
      console.error(error);
    } else {
      document.getElementById("message").innerText = "Booking successful!";
    }
  }
</script>

</body>
</html>
