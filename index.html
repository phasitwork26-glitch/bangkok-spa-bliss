<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Lab</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

<style>
body {
  background: black;
  color: white;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.big-text {
  font-size: 8vw;
  font-weight: bold;
}
</style>
</head>

<body>

<section class="section">
  <h1 class="big-text text1">Designed to Move.</h1>
</section>

<section class="section">
  <h1 class="big-text text2">Built to Inspire.</h1>
</section>

<section class="section">
  <h1 class="big-text text3">Scroll is Power.</h1>
</section>

<script>
const lenis = new Lenis({ duration: 1.4 });

function raf(time) {
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

gsap.registerPlugin(ScrollTrigger);

lenis.on('scroll', ScrollTrigger.update);

gsap.utils.toArray(".section").forEach((section) => {
  gsap.from(section.querySelector("h1"), {
    scrollTrigger: {
      trigger: section,
      start: "top center",
      end: "bottom center",
      scrub: true
    },
    scale: 0.7,
    opacity: 0.2
  });
});
</script>

</body>
</html>
