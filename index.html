<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GSAP Training</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
body{
  background:black;
  color:white;
  overflow-x:hidden;
}
.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  width:200px;
  height:200px;
  background:white;
}
</style>
</head>
<body>

<section class="section">
  <h1 class="text-6xl">Scroll Down</h1>
</section>

<section class="section">
  <div class="box"></div>
</section>

<section class="section">
  <h1 class="text-6xl">End</h1>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

let tl = gsap.timeline({
  scrollTrigger:{
    trigger:".box",
    start:"top center",
    end:"+=1000",
    scrub:true,
    pin:true
  }
});

tl.to(".box",{scale:2})
  .to(".box",{rotate:180})
  .to(".box",{background:"red"});

</script>

</body>
</html>
